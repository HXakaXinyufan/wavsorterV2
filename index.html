  <body class="song-sorter">
    <div class="theme-toggle" style="display: flex; gap: 15px;">
      
      <button id="music-toggle" style="background: none; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; color: inherit; padding: 0;">

      </button>
      
      <div id="dark-mode-btn" style="display: flex; align-items: center; cursor: pointer;">
        <span id="dark-mode-text" class="theme-toggle-text">#DarkMode</span>
        <div class="theme-toggle-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </div>
      </div>
      
    </div>
    
    <header class="page-header container">
      <h1>WAVs bias sorter</h1>
      <div>
        <p>Choose your favorite WAV in each battle to get an accurate ranking.</p>
      </div>
    </header>
    
    <main class="page-sorter" id="page-sorter">
      <div class="container">
        <h2 id="battleNumber" class="sorter-header">
          <strong>Battle #1</strong><br />♡♡♡♡♡ 0% sorted
        </h2>

        <div class="sorter-game">

            <div id="optionA" class="sorter-option" style="--member-color: #f87fff">
              <div class="photocard-info no-image">

              </div>
            </div>
            <div class="versus"><span>vs</span></div>
            <div id="optionB" class="sorter-option" style="--member-color: #f87fff">
              <div class="photocard-info no-image">
                <div class="member-name">Loading...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
