<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WAVs Bias Sorter</title>
    <link rel="stylesheet" href="assets/sorter.css" />
    <script type="module" src="assets/sorter.js"></script>
    <style>
      .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; text-align: left; margin: 20px 0 30px 0; max-height: 50vh; overflow-y: auto; padding: 15px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); }
      .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
      .checkbox-item input { cursor: pointer; width: 16px; height: 16px; accent-color: #f87fff; }
      .controls-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    </style>
  </head>
  <body class="song-sorter">
    <div id="dark-mode-btn" class="theme-toggle">
      <span id="dark-mode-text" class="theme-toggle-text">#DarkMode</span>
      <div class="theme-toggle-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></div>
    </div>
    
    <header class="page-header container">
      <h1>WAVs bias sorter</h1>
      <div><p>Choose your favorite WAV in each battle to get an accurate ranking.</p></div>
    </header>

    <section id="selection-screen" class="container" style="text-align: center;">
      <h2>Select who you want to sort!</h2>
      <div class="controls-row">
        <button id="btn-select-all" class="result-btn">Select All</button>
        <button id="btn-clear-all" class="result-btn">Clear All</button>
      </div>
      <div id="checkbox-container" class="checkbox-grid"></div>
      <button id="btn-start-sort" class="result-btn result-btn-primary" style="font-size: 1.2rem; padding: 15px 30px; margin-bottom: 40px;">Start Sorting</button>
    </section>
    
    <main class="page-sorter" id="page-sorter" style="display: none;">
      <div class="container">
        <h2 id="battleNumber" class="sorter-header"><strong>Battle #1</strong><br />♡♡♡♡♡ 0% sorted</h2>
        <div class="sorter-game">
          <div class="main-battle">
            <div id="optionA" class="sorter-option" style="--member-color: #f87fff"><div class="photocard-info no-image"><div class="member-name">Loading...</div></div></div>
            <div class="versus">
                <span>vs</span>
                <button id="undo-btn" class="undo-btn">Undo</button>
            </div>
            <div id="optionB" class="sorter-option" style="--member-color: #f87fff"><div class="photocard-info no-image"><div class="member-name">Loading...</div></div></div>
          </div>
        </div>
      </div>
    </main>

    <section class="page-result">
      <div class="container">
        <div id="battleResult"></div>
        <a id="showMore" style="display: none; cursor: pointer">Show More</a>
      </div>
    </section>

    <footer class="page-footer">
      <a href="https://x.com/wav_HX" class="footer-link">stolen from <span class="accent-text">@celdaris</span> by <span class="accent-text">@wav_HX</span></a>
    </footer>
    <audio id="bg-music"></audio>
  </body>
</html>
